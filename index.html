<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FinTrack Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav>

<div class="logo">
FinTrack Pro
</div>

<ul>

<li onclick="showPage('dashboard')">
Dashboard
</li>

<li onclick="showPage('settings')">
Settings
</li>

</ul>

<div>

<button onclick="openModal()">
+ Add Transaction
</button>

<button onclick="logout()">
Logout
</button>

</div>

</nav>

<main>

<section id="dashboardPage">

<div class="cards">

<div class="card balance">

<h4>Current Balance</h4>

<h2 id="balance">
₹0
</h2>

</div>

<div class="card income">

<h4>Total Income</h4>

<h2 id="income">
₹0
</h2>

</div>

<div class="card expense">

<h4>Total Expense</h4>

<h2 id="expense">
₹0
</h2>

</div>

<div class="card total">

<h4>Total Transactions</h4>

<h2 id="count">
0
</h2>

</div>

</div>

<div class="chartCard">

<canvas id="chart"></canvas>

</div>

<div class="filters">

<button onclick="filterTransactions('all')">
All
</button>

<button onclick="filterTransactions('income')">
Income
</button>

<button onclick="filterTransactions('expense')">
Expense
</button>

</div>

<table>

<thead>

<tr>

<th>Date</th>

<th>Description</th>

<th>Category</th>

<th>Amount</th>

<th>Action</th>

</tr>

</thead>

<tbody id="transactionTable">

</tbody>

</table>

</section>

<section id="settingsPage" class="hidden">

<h2>Settings</h2>

<label>Name</label>

<input
id="username"
type="text">

<label>Currency</label>

<select id="currency">

<option value="₹">INR</option>

<option value="$">USD</option>

<option value="€">EUR</option>

<option value="£">GBP</option>

<option value="¥">JPY</option>

</select>

<div class="toggle">

<label>Dark Mode</label>

<input
type="checkbox"
id="theme">

</div>

<button class="danger" onclick="resetData()">
Reset Everything
</button>

</section>

</main>

<div id="modal" class="modal">

<div class="modal-content">

<span onclick="closeModal()">&times;</span>

<h2>Add Transaction</h2>

<form id="transactionForm">

<select id="type">

<option value="income">
Income
</option>

<option value="expense">
Expense
</option>

</select>

<input
type="text"
placeholder="Description"
id="description">

<input
type="number"
placeholder="Amount"
id="amount">

<input
type="date"
id="date">

<select id="category">

<option>Food</option>

<option>Shopping</option>

<option>Salary</option>

<option>Bills</option>

<option>Entertainment</option>

<option>Transport</option>

<option>Other</option>

</select>

<button type="submit">
Save Transaction
</button>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
